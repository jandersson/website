<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Jonas Andersson</title>
    <link href='https://fonts.googleapis.com/css?family=Raleway:100,300,400' rel='stylesheet' type='text/css'>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #111;
            color: #eee;
            font-family: 'Raleway', sans-serif;
            font-weight: 300;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            border: 1px solid #333;
            padding: 48px 56px;
            max-width: 480px;
            width: 100%;
        }

        h1 {
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .title {
            font-size: 12px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 32px;
        }

        .bio {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .links {
            font-size: 12px;
            letter-spacing: 0.1em;
        }

        .links a {
            color: #eee;
            text-decoration: none;
            margin-right: 24px;
            text-transform: uppercase;
        }

        .links a:hover {
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Jonas Andersson</h1>
        <div class="title">Data Engineer</div>
        <div class="bio">Based in Stockholm. Originally from Chicago.</div>
        <div class="links">
            <a href="https://github.com/jandersson" target="_blank">GitHub</a>
            <a href="https://www.linkedin.com/in/anderssonjonas/" target="_blank">LinkedIn</a>
        </div>
    </div>
</body>
</html>
